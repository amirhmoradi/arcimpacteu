# yaml-language-server: $schema=https://unpkg.com/@sveltia/cms/schema/sveltia-cms.json
#
# GitHub Pages: site + this admin are served from the repo root (/admin/).
# Auth: team uses one limited PAT in Sveltia (“Sign in with token”) — see docs/sveltia-cms-setup.md §4.1 (security).
# Optional OAuth: set backend.base_url to a Sveltia CMS Authenticator Worker URL instead of sharing a PAT.

backend:
  name: github
  repo: amirhmoradi/arcimpacteu
  # base_url: https://your-sveltia-auth-worker.workers.dev

media_folder: /public/media
public_folder: /media

i18n:
  structure: multiple_folders
  locales: [fr, en, it]

collections:
  - name: pages
    label: Pages
    label_singular: Page
    description: Contenu éditorial (FR prioritaire, puis EN / IT)
    folder: /content/pages
    create: true
    slug: "{{slug}}"
    extension: md
    format: frontmatter
    i18n: true
    fields:
      - { label: Title, name: title, widget: string, i18n: true }
      - { label: Slug (URL), name: slug, widget: string, hint: "e.g. emmanuel-lecuyer — no spaces", i18n: duplicate }
      - { label: Date, name: date, widget: datetime, type: date, i18n: duplicate }
      - { label: SEO description, name: description, widget: text, i18n: true }
      - { label: Hero image (URL or /media/...), name: hero_image, widget: string, required: false, i18n: true }
      - { label: Body, name: body, widget: markdown, i18n: true }

  - name: site_meta
    label: Calendrier & événements (JSON)
    description: Paramètres lus par le site au build — calendrier public et cartes « Événements ».
    files:
      - name: calendar
        label: Calendrier (iframe + liens)
        file: content/meta/calendar.json
        format: json
        fields:
          - {
              label: URL d’intégration (iframe),
              name: embedUrl,
              widget: string,
              required: false,
              hint: "Google Calendar → Paramètres → Intégrer le calendrier → copier uniquement l’URL (src) du iframe.",
            }
          - { label: Lien agenda public (Google), name: publicCalendarUrl, widget: string, required: false }
          - { label: Lien abonnement ICS, name: icsUrl, widget: string, required: false }
          - label: Encadré d’aide (HTML, par langue)
            name: intro
            widget: object
            collapsed: true
            fields:
              - { label: Français, name: fr, widget: text, required: false }
              - { label: English, name: en, widget: text, required: false }
              - { label: Italiano, name: it, widget: text, required: false }
      - name: featured_evenements
        label: Événements mis en avant
        file: content/meta/featuredEvenements.json
        format: json
        fields:
          - label: Cartes (ordre croissant)
            name: items
            widget: list
            summary: "{{fields.order}}"
            fields:
              - { label: Ordre, name: order, widget: number, value_type: int, default: 1 }
              - { label: Image (/images/... ou URL), name: image, widget: string }
              - label: Badge
                name: badge
                widget: object
                collapsed: true
                fields:
                  - { label: FR, name: fr, widget: string }
                  - { label: EN, name: en, widget: string }
                  - { label: IT, name: it, widget: string }
              - label: Titre
                name: title
                widget: object
                collapsed: true
                fields:
                  - { label: FR, name: fr, widget: string }
                  - { label: EN, name: en, widget: string }
                  - { label: IT, name: it, widget: string }
              - label: Extrait
                name: excerpt
                widget: object
                collapsed: true
                fields:
                  - { label: FR, name: fr, widget: string }
                  - { label: EN, name: en, widget: string }
                  - { label: IT, name: it, widget: string }
              - label: Lien (chemins par langue, ex. /stages/stage-3d/)
                name: href
                widget: object
                collapsed: true
                fields:
                  - { label: FR, name: fr, widget: string }
                  - { label: EN, name: en, widget: string }
                  - { label: IT, name: it, widget: string }
      - name: home_posters
        label: Affiches page d’accueil (carrousel)
        file: _data/posters.json
        format: json
        fields:
          - label: Affiches (ordre = défilement)
            name: slides
            widget: list
            summary: "{{fields.slug}}"
            fields:
              - { label: Image (/images/...), name: image, widget: string }
              - { label: Lien stage (slug fichier), name: slug, widget: string, hint: "ex. stage-3d → /stages/stage-3d/" }
              - label: Texte alternatif (SEO)
                name: alt
                widget: object
                collapsed: true
                fields:
                  - { label: FR, name: fr, widget: string }
                  - { label: EN, name: en, widget: string }
                  - { label: IT, name: it, widget: string }
